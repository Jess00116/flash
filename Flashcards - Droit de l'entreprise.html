le de droit ?", "a": "<b>But formel</b> : simplifier la connaissance et l'application du droit.<br><b>But matériel</b> : inciter les destinataires à agir ou à s'abstenir."}, {"id": 289, "t": 4, "q": "Quelles sont les quatre conceptions de l'État ?", "a": "<b>Patrimoniale</b> : l'État personnifié en une personne (le Roi).<br><b>Pacte social</b> : les citoyens cèdent une part de leurs droits contre une liberté garantie.<br><b>Libérale</b> : la liberté n'est pas absolue, elle s'arrête où commence celle d'autrui.<br><b>Étatiste</b> : les besoins de l'État priment sur l'individu. (Révision de 1999 : Constitution libérale + État providence.)"}, {"id": 290, "t": 4, "q": "Quelles sont les grandes étapes de la procédure législative fédérale ?", "a": "1) <b>Initiative législative</b> ; 2) <b>avant-projet</b> ; 3) <b>procédure de consultation</b> ; 4) <b>projet + message</b> à l'Assemblée fédérale ; 5) <b>délibération et vote</b> ; 6) <b>publication</b> dans la Feuille fédérale (délai de référendum) ; 7) entrée en vigueur."}, {"id": 291, "t": 4, "q": "Distinguez référendum obligatoire, référendum facultatif et initiative populaire (seuils).", "a": "<b>Référendum obligatoire</b> : toute révision de la Constitution (vote du peuple ET des cantons).<br><b>Référendum facultatif</b> : contre une loi fédérale, si <b>50 000 signatures</b> ou <b>8 cantons</b> le demandent.<br><b>Initiative populaire</b> : <b>100 000 signatures en 18 mois</b>, et seulement pour modifier la Constitution."}, {"id": 292, "t": 4, "q": "Distinguez décisions d'espèce et décisions de principe (jurisprudence).", "a": "<b>Décision d'espèce</b> : applique la loi au cas, sans apporter de complément général.<br><b>Décision de principe</b> : le juge tient un raisonnement <b>transposable</b> à d'autres cas — sa portée dépasse le cas particulier."}, {"id": 293, "t": 5, "q": "Quelle est la théorie formelle de distinction droit public / privé ?", "a": "<b>Droit privé</b> : forme <b>contractuelle</b> (les sujets sont libres, dans certaines limites, de régler leur relation).<br><b>Droit public</b> : forme de l'<b>injonction</b> (acte imposé unilatéralement)."}, {"id": 294, "t": 6, "q": "Quels sont les trois objectifs (domaines) du droit administratif ?", "a": "<b>Police</b> : maintien de l'ordre et de la santé publics.<br><b>Institutions sociales</b> : services sociaux, culturels et économiques.<br><b>Financier</b> : gestion des finances publiques."}, {"id": 295, "t": 6, "q": "Quels sont les degrés d'une infraction pénale (consommée, tentative, impossible) ?", "a": "<b>Délit consommé</b> : le résultat se produit.<br><b>Tentative</b> : l'auteur commence l'exécution mais le résultat ne survient pas.<br><b>Délit impossible</b> : le résultat ne pouvait pas se produire (moyen/objet inadéquat). Les <b>actes préparatoires</b> ne sont en principe pas punissables."}, {"id": 296, "t": 6, "q": "Distinguez négligence consciente et négligence inconsciente.", "a": "<b>Consciente</b> : l'auteur envisage la possibilité du résultat mais pense (à tort) qu'il ne se produira pas.<br><b>Inconsciente</b> : l'auteur ne pense même pas aux conséquences de son acte. (À distinguer du <b>dol éventuel</b>, où l'auteur accepte le résultat.)"}, {"id": 297, "t": 6, "q": "Quels sont les trois buts de la peine ?", "a": "<b>Expiation</b> : l'auteur « paie » pour ce qu'il a commis.<br><b>Prévention</b> : dissuader (lui et les autres).<br><b>Amendement</b> : éviter la récidive en favorisant la réinsertion."}, {"id": 298, "t": 6, "q": "Qu'est-ce que l'ordonnance pénale ?", "a": "Une procédure simplifiée lorsque le prévenu <b>admet les faits</b> : le ministère public sanctionne sans procès ordinaire. Plafonds : <b>amende</b>, <b>180 jours-amende</b>, <b>720 h de TIG</b> ou <b>6 mois de peine privative de liberté</b>."}, {"id": 299, "t": 6, "q": "À partir de quel âge s'applique le droit pénal des mineurs ?", "a": "De <b>10 à 18 ans</b> : des peines et mesures particulières, adaptées au mineur, s'appliquent (priorité à l'éducation et à la protection)."}, {"id": 300, "t": 6, "q": "Quelles sont les sources du droit international public ?", "a": "Les <b>conventions / traités</b>, les <b>coutumes internationales</b>, les <b>principes généraux</b> du droit, ainsi que la <b>jurisprudence</b> (notamment de la Cour internationale de Justice) et la <b>doctrine</b>."}, {"id": 301, "t": 7, "q": "Comment se détermine la compétence territoriale (le « for ») selon le type de litige ?", "a": "<b>Dette d'argent</b> : domicile du <b>débiteur</b>.<br><b>Action sur un immeuble</b> : lieu de l'<b>immeuble</b>.<br><b>Succession</b> : dernier domicile du <b>défunt</b>.<br><b>Acte illicite</b> : domicile de la victime, lieu de l'acte ou lieu du résultat (favorise la victime).<br>Pour une entreprise : son <b>siège</b>."}, {"id": 302, "t": 7, "q": "Comment se répartit la compétence matérielle des tribunaux pénaux (selon la gravité) ?", "a": "<b>Tribunal de police</b> : jusqu'à 12 mois de PPL.<br><b>Tribunal correctionnel</b> : jusqu'à 6 ans de PPL.<br><b>Tribunal criminel</b> : au-delà de 6 ans de PPL."}, {"id": 303, "t": 7, "q": "Quelles sont les grandes étapes de la procédure civile ?", "a": "1) <b>Dépôt de la demande</b> (litispendance) ; 2) <b>échange d'écritures</b> (légitimation active/passive) ; 3) <b>instruction préliminaire</b> (fixation de l'objet du litige) ; 4) <b>instruction probatoire</b> (preuves ; fardeau à celui qui allègue) ; 5) <b>jugement</b> (autorité de la chose jugée)."}, {"id": 304, "t": 7, "q": "Distinguez l'appel, le recours et la révision.", "a": "<b>Appel</b> : la cause est rejugée <b>entièrement</b> par l'instance supérieure (nouvelle instruction).<br><b>Recours</b> : voie plus limitée, contre certaines décisions (finales non susceptibles d'appel, actes des autorités).<br><b>Révision</b> (exceptionnelle) : rouvrir un procès clos lorsque des <b>faits nouveaux</b> sont découverts après coup."}, {"id": 305, "t": 7, "q": "Quels sont les avantages et inconvénients de l'arbitrage ?", "a": "<b>Avantages</b> : choix des arbitres, procédure plus <b>rapide</b> et <b>confidentielle</b>, sentence de même valeur qu'un jugement.<br><b>Inconvénients</b> : plus <b>coûteux</b> ; certains litiges en sont exclus (ex. on ne peut pas divorcer par arbitrage)."}, {"id": 306, "t": 7, "q": "Quels sont les moyens de preuve en procédure ?", "a": "La preuve <b>écrite</b> (titres), les <b>témoins</b>, l'<b>expertise</b>, l'<b>inspection locale</b> et l'<b>aveu</b>."}, {"id": 307, "t": 7, "q": "Quelles sont les attaches juridiques d'une personne physique ?", "a": "La <b>parenté</b> (lien de filiation ; ≠ alliance, créée par le mariage), le <b>droit de cité</b> (rattachement à un lieu par l'ascendance, l'adoption, le mariage ou la naturalisation), le <b>domicile</b>, l'<b>état civil</b> et le <b>nom</b>."}, {"id": 308, "t": 7, "q": "Distinguez domicile volontaire et domicile légal (principes de nécessité et d'unité).", "a": "<b>Volontaire</b> : lieu où la personne réside avec l'intention de s'y établir.<br><b>Légal</b> : domicile que la loi attribue (ex. enfant, personne sous curatelle).<br>Deux principes : <b>nécessité</b> (toute personne doit avoir un domicile) et <b>unité</b> (un seul domicile à la fois)."}, {"id": 309, "t": 7, "q": "Quelles sont les conditions de l'exercice des droits civils, et les degrés d'incapacité ?", "a": "Il faut être <b>majeur</b>, <b>capable de discernement</b> et <b>non sous curatelle de portée générale</b>. Le mineur a une <b>incapacité restreinte</b> (il agit par son représentant) ; la personne sans discernement a une <b>incapacité totale</b>."}, {"id": 310, "t": 7, "q": "Que se passe-t-il en cas d'absence de longue durée d'une personne ?", "a": "Si une absence prolongée rend la mort très probable, le juge peut prononcer une <b>déclaration d'absence</b> : tout se passe alors comme si la personne était décédée (ouverture de la succession, etc.)."}, {"id": 311, "t": 7, "q": "Quels sont les objets de la personnalité et les actions ouvertes à la victime d'une atteinte ?", "a": "<b>Objets</b> : vie et intégrité, honneur, sphère intime, image, sphère d'activité économique.<br><b>Actions</b> (art. 28 CC) : <b>prévention</b> (atteinte imminente), <b>cessation</b> (trouble qui dure), <b>constatation</b> du caractère illicite, et <b>dommages-intérêts</b>."}, {"id": 312, "t": 7, "q": "Quelles sont les conditions de constitution d'une personne morale ?", "a": "Un <b>groupement de personnes</b> (ou un patrimoine), une <b>base contractuelle</b>, un <b>but commun</b>, l'<b>inscription au registre du commerce</b>, une <b>organisation</b> (statuts, organes) et le <b>déploiement d'une activité</b> indépendante de ses membres."}, {"id": 313, "t": 7, "q": "Quand commence et finit la personnalité d'une personne morale ?", "a": "Elle <b>commence à l'inscription au registre du commerce</b> et <b>finit à la dissolution</b> (par la loi, décision du juge ou des membres), laquelle entraîne la <b>liquidation</b> du patrimoine. La PM agit par ses <b>organes</b> et peut même être instituée <b>héritière</b>."}, {"id": 314, "t": 7, "q": "Distinguez personnes morales de droit public et de droit privé.", "a": "<b>Droit public</b> : collectivités publiques, établissements de droit public, corporations ecclésiastiques.<br><b>Droit privé</b> : associations, fondations, sociétés (régies par le CC/CO)."}, {"id": 315, "t": 7, "q": "Distinguez parties intégrantes et parties accessoires d'une chose.", "a": "<b>Partie intégrante</b> : élément lié à la chose dont il forme un tout → suit le <b>régime juridique unique</b> de la chose principale.<br><b>Partie accessoire</b> : élément distinct, ayant un lien d'utilité avec la chose principale → peut garder un régime propre."}, {"id": 316, "t": 7, "q": "Quelles distinctions s'appliquent aux choses mobilières (meubles) ?", "a": "<b>Fongibles / non-fongibles</b> (interchangeables selon nombre, poids, mesure ou non).<br><b>Choses de genre / corps certains</b> (« un cheval » / « CE cheval »).<br><b>Consomptibles / non-consomptibles</b> (qui disparaissent ou non par un usage normal)."}, {"id": 317, "t": 7, "q": "Distinguez acquisition originaire et acquisition dérivée de la propriété.", "a": "<b>Originaire</b> : sans prédécesseur — occupation d'une chose <b>sans maître</b>, acquisition d'une chose <b>perdue</b>, ou <b>prescription acquisitive</b> (une chose mobilière possédée <b>5 ans</b> sans être réclamée devient la propriété du possesseur).<br><b>Dérivée</b> : par <b>acte juridique</b> entre ancien et nouveau propriétaire."}, {"id": 318, "t": 7, "q": "Qu'est-ce que la déréliction ?", "a": "L'acte par lequel le propriétaire <b>abandonne volontairement</b> son droit de propriété sur une chose (la chose devient alors sans maître)."}, {"id": 319, "t": 7, "q": "Quels sont les principes du droit de gage ?", "a": "<b>Spécialité</b> : porte sur une chose précise.<br><b>Caractère accessoire</b> : disparaît dès que la dette garantie est éteinte.<br><b>Caractère subsidiaire</b> : on cherche d'abord le remboursement par d'autres voies.<br><b>Publicité</b> : doit être reconnaissable par les tiers (registre foncier / possession)."}, {"id": 320, "t": 7, "q": "Quels sont les critères de la possession (objectifs et subjectif) ?", "a": "<b>Objectifs</b> : la maîtrise de fait suppose <b>indépendance</b>, <b>exclusivité</b> et <b>durée</b>.<br><b>Subjectif</b> : le possesseur doit avoir la <b>conscience et la volonté</b> de posséder. La possession est indépendante de tout droit sur la chose."}, {"id": 321, "t": 7, "q": "Distinguez héritiers légaux et héritiers institués.", "a": "<b>Héritiers légaux</b> : désignés par la loi à raison d'un lien de parenté/conjugal, en l'absence de testament (succession « <b>ab intestat</b> »).<br><b>Héritiers institués</b> : désignés par le défunt lui-même (succession volontaire) ; ils peuvent aussi être des héritiers légaux."}, {"id": 322, "t": 7, "q": "Quelle est la part du conjoint survivant selon la parentèle avec laquelle il concourt ?", "a": "<b>1/2</b> de la succession en concours avec les <b>descendants</b> ; <b>3/4</b> en concours avec la parentèle des <b>père et mère</b> ; <b>la totalité</b> dans les autres cas. Le conjoint ne fait partie d'aucune parentèle mais est héritier légal."}, {"id": 323, "t": 7, "q": "Quelles sont les règles de répartition entre parentèles ?", "a": "Chaque <b>parentèle prime la suivante</b> (les descendants excluent les parents, etc.) ; à l'intérieur d'une parentèle, la <b>tête de souche prime ses descendants</b> ; à défaut, répartition par représentation. Le conjoint est hors parentèle."}, {"id": 324, "t": 7, "q": "Qu'est-ce que l'exhérédation ?", "a": "Les cas, prévus par la loi, où le testateur peut <b>priver un héritier de sa réserve</b> (ex. infraction grave de l'héritier contre le défunt ou un proche, manquement grave aux devoirs de famille)."}, {"id": 325, "t": 7, "q": "Quelles sont les trois formes du testament (dont la forme orale) ?", "a": "<b>Authentique</b> : devant notaire + 2 témoins.<br><b>Olographe</b> : écrit, daté et signé entièrement à la main.<br><b>Oral</b> : exceptionnel — testateur en <b>danger de mort</b> et empêché d'écrire, qui déclare ses volontés à <b>2 témoins</b>."}, {"id": 326, "t": 7, "q": "Distinguez pacte successoral positif (d'attribution) et négatif (abdicatif).", "a": "<b>Positif / d'attribution</b> : le testateur institue le cocontractant comme héritier ou légataire.<br><b>Négatif / abdicatif</b> : le cocontractant <b>renonce</b> à tout ou partie de ses droits dans la succession. (Forme authentique requise.)"}, {"id": 327, "t": 7, "q": "Comment l'héritier peut-il éviter d'assumer les dettes de la succession ?", "a": "Trois possibilités : <b>répudier</b> la succession (la refuser) ; l'accepter sous <b>bénéfice d'inventaire</b> (connaître l'actif/passif avant d'accepter) ; demander la <b>liquidation officielle</b> (la succession est liquidée comme une faillite). Jusqu'au partage, les héritiers forment une <b>hoirie</b> (communauté héréditaire)."}, {"id": 333, "t": 7, "q": "Quels sont les problèmes successifs résolus par le droit international privé ?", "a": "1) La <b>qualification</b> : de quel domaine juridique relève le rapport ?<br>2) Le <b>rattachement</b> : relier le rapport à un ordre juridique selon des critères — lieu de <b>domicile</b>, <b>situation des biens</b>, existence de <b>liens étroits</b>, <b>lieu de l'acte illicite</b>.<br>3) La <b>reconnaissance / exécution</b> d'un jugement étranger."}];

const TITLES = [
 "Titre I — Notion et fonctions du droit",
 "Titre II — Les sujets de droit",
 "Titre III — La règle de droit",
 "Titre IV — Les sources du droit",
 "Titre V — Les grandes divisions du droit",
 "Titre VI — Le droit public",
 "Titre VII — Le droit privé",
 "Titre VIII — Les obligations en général",
 "Titre IX — Les sources des obligations",
 "Titre X — Les obligations contractuelles",
 "Titre XI — La responsabilité civile (délictuelle)",
 "Titre XII — La responsabilité contractuelle",
 "Titre XIII — L'enrichissement illégitime",
 "Titre XIV — Les modalités des obligations",
 "Titre XV — La transmission des obligations",
 "Titre XVI — L'exécution des obligations",
 "Titre XVII — L'extinction des obligations"
];

// ---- Build filter dropdown ----
const filterEl = document.getElementById('filter');
const optAll = document.createElement('option');
optAll.value = 'all'; optAll.textContent = `Tout le cours (${CARDS.length} cartes)`;
filterEl.appendChild(optAll);
const nVf = CARDS.filter(c=>c.vf).length;
if(nVf){
  const ov=document.createElement('option');
  ov.value='vf'; ov.textContent=`★ Pièges QCM Vrai/Faux (${nVf})`;
  filterEl.appendChild(ov);
}
TITLES.forEach((t,i)=>{
  const n = CARDS.filter(c=>c.t===i+1).length;
  if(!n) return;
  const o=document.createElement('option');
  o.value=String(i+1); o.textContent=`${t} (${n})`;
  filterEl.appendChild(o);
});

// ---- State ----
let deck=[], idx=0, known=new Set(), again=new Set(), revealed=false;
const $ = id=>document.getElementById(id);

function buildDeck(){
  const f=filterEl.value;
  let pool;
  if(f==='all') pool=CARDS.slice();
  else if(f==='vf') pool=CARDS.filter(c=>c.vf);
  else pool=CARDS.filter(c=>String(c.t)===f);
  if($('reviewMode').checked && window.__lastAgain && window.__lastAgain.length){
    pool = pool.filter(c=>window.__lastAgain.includes(c.id));
  }
  if($('shuffle').checked){
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  }
  return pool;
}

function start(){
  deck=buildDeck();
  if(!deck.length){alert('Aucune carte à réviser dans cette sélection.');return;}
  idx=0;known=new Set();again=new Set();
  $('app').style.display='block';
  $('done').style.display='none';
  render();
  $('app').scrollIntoView({behavior:'smooth',block:'start'});
}

function render(){
  if(idx>=deck.length){finish();return;}
  const c=deck[idx];
  revealed=false;
  $('card').classList.remove('flipped');
  $('rate').style.display='none';
  const label = c.vf ? `Piège QCM · ${TITLES[c.t-1]}` : `${TITLES[c.t-1]}`;
  $('tagF').textContent=label;
  $('tagB').textContent=label;
  $('tagF').classList.toggle('vf',!!c.vf);
  $('tagB').classList.toggle('vf',!!c.vf);
  $('question').textContent=c.q;
  $('answer').innerHTML=c.a;
  $('counter').textContent=`${idx+1} / ${deck.length}`;
  $('sectionLabel').textContent = filterEl.value==='all' ? 'Tout le cours' : TITLES[c.t-1];
  const pct=Math.round((idx)/deck.length*100);
  $('pct').textContent=pct+' %';
  $('barFill').style.width=pct+'%';
}

function flip(){
  revealed=!revealed;
  $('card').classList.toggle('flipped',revealed);
  $('rate').style.display=revealed?'flex':'none';
}

function rate(ok){
  const c=deck[idx];
  if(ok){known.add(c.id);again.delete(c.id);} else {again.add(c.id);}
  next();
}
function next(){ if(idx<deck.length-1){idx++;render();} else {idx++;finish();} }
function prev(){ if(idx>0){idx--;render();} }

function finish(){
  window.__lastAgain=[...again];
  $('app').style.display='none';
  const d=$('done');
  const total=deck.length, k=known.size, a=again.size;
  d.style.display='block';
  d.innerHTML=`
    <h2>Session terminée 🎓</h2>
    <p>${TITLES_label()}</p>
    <div>
      <span class="stat" style="color:var(--ok)">${k}<small>acquis</small></span>
      <span class="stat" style="color:var(--warn)">${a}<small>à revoir</small></span>
      <span class="stat">${total}<small>au total</small></span>
    </div>
    <div class="row" style="justify-content:center;margin-top:24px">
      ${a?`<button class="btn-primary" onclick="replayAgain()">Rejouer les ${a} cartes à revoir</button>`:''}
      <button onclick="start()">Recommencer la section</button>
      <button onclick="location.reload()">Changer de section</button>
    </div>`;
  d.scrollIntoView({behavior:'smooth',block:'start'});
}
function TITLES_label(){return filterEl.value==='all'?'Tout le cours':TITLES[+filterEl.value-1];}
function replayAgain(){
  deck=CARDS.filter(c=>window.__lastAgain.includes(c.id));
  if($('shuffle').checked) for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  idx=0;known=new Set();again=new Set();
  $('done').style.display='none';$('app').style.display='block';render();
}

// ---- Events ----
$('start').onclick=start;
$('card').onclick=flip;
$('again').onclick=()=>rate(false);
$('known').onclick=()=>rate(true);
$('next').onclick=next;
$('prev').onclick=prev;
document.addEventListener('keydown',e=>{
  if($('app').style.display==='none')return;
  if(e.code==='Space'){e.preventDefault();flip();}
  else if(e.code==='ArrowRight')next();
  else if(e.code==='ArrowLeft')prev();
  else if(e.key==='1'&&revealed)rate(false);
  else if(e.key==='2'&&revealed)rate(true);
});
window.replayAgain=replayAgain;window.start=start;
</script>
</body>
</html>
